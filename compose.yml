x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "10"

networks:
  learnhub:
    driver: bridge

volumes:
  mysql-data:
  minio-data:

services:
  learnhub:
    image: learnhub/light:local
    build: .
    restart: always
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=learnhub
      - DB_USER=root
      - DB_PASS=learnhub
      - LEARNHUB_DEMO_DATA_ENABLED=${LEARNHUB_DEMO_DATA_ENABLED:-true}
      - SA_TOKEN_IS_CONCURRENT=false
      - SA_TOKEN_JWT_SECRET_KEY=${LEARNHUB_JWT_KEY:-learnhub}
    ports:
      - "${LEARNHUB_API_PORT:-9700}:9898"
      - "${LEARNHUB_PC_PORT:-9800}:9800"
      - "${LEARNHUB_ADMIN_PORT:-9900}:9900"
    networks:
      - learnhub
    depends_on:
      - mysql
      - minio
    logging: *default-logging

  mysql:
    build: ./docker/mysql
    restart: always
    environment:
      - MYSQL_DATABASE=learnhub
      - MYSQL_ROOT_PASSWORD=learnhub
      - TZ=UTC
    volumes:
      - mysql-data:/var/lib/mysql
    ports:
      - "${MYSQL_PORT:-23307}:3306"
    networks:
      - learnhub
    logging: *default-logging

  minio:
    image: minio/minio:latest
    restart: always
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-learnhub}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-learnhub123456}
      - MINIO_API_CORS_ALLOW_ORIGIN=${MINIO_API_CORS_ALLOW_ORIGIN:-http://localhost:9900,http://127.0.0.1:9900,http://minio.localhost:9900}
    volumes:
      - minio-data:/data
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    networks:
      learnhub:
        aliases:
          - minio.localhost
    logging: *default-logging

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        until mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"; do sleep 2; done;
        mc mb --ignore-existing "local/$${MINIO_BUCKET}";
        mc anonymous set none "local/$${MINIO_BUCKET}"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-learnhub}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-learnhub123456}
      - MINIO_BUCKET=${MINIO_BUCKET:-learnhub}
    networks:
      - learnhub
    logging: *default-logging
